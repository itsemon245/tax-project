name: production

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cpanel-deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Load deploy config
        id: config
        shell: bash
        env:
          DOT_ENV_SECRET: ${{ secrets.DOT_ENV }}
          CURRENT_BRANCH: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -Eeuo pipefail

          set_config() {
            local key="$1"
            local value="$2"

            printf -v "$key" '%s' "$value"
            export "$key"
            printf '%s=%s\n' "$key" "$value" >> "$GITHUB_ENV"
          }

          if [ -z "${DOT_ENV_SECRET:-}" ] && [ "$CURRENT_BRANCH" != "$DEFAULT_BRANCH" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Skipping deploy for $CURRENT_BRANCH. DOT_ENV is not required outside the default branch."
            exit 0
          fi

          if [ -z "${DOT_ENV_SECRET:-}" ]; then
            echo "::error::Missing required DOT_ENV secret."
            exit 1
          fi

          while IFS= read -r raw_line || [ -n "$raw_line" ]; do
            line="${raw_line%$'\r'}"

            if [[ "$line" =~ ^[[:space:]]*$ ]] || [[ "$line" =~ ^[[:space:]]*# ]]; then
              continue
            fi

            if [[ "$line" == export[[:space:]]* ]]; then
              line="${line#export }"
            fi

            if [[ "$line" != *=* ]]; then
              echo "::error::Invalid DOT_ENV line. Expected KEY=value."
              exit 1
            fi

            key="${line%%=*}"
            value="${line#*=}"
            key="${key#"${key%%[![:space:]]*}"}"
            key="${key%"${key##*[![:space:]]}"}"

            if [[ ! "$key" =~ ^[A-Za-z_][A-Za-z0-9_]*$ ]]; then
              echo "::error::Invalid DOT_ENV key: $key"
              exit 1
            fi

            if [ "${#value}" -ge 2 ]; then
              if [[ "$value" == \"*\" && "$value" == *\" ]]; then
                value="${value:1:${#value}-2}"
              elif [[ "$value" == \'*\' && "$value" == *\' ]]; then
                value="${value:1:${#value}-2}"
              fi
            fi

            set_config "$key" "$value"
          done <<< "$DOT_ENV_SECRET"

          DEPLOY_BRANCH="${DEPLOY_BRANCH:-$DEFAULT_BRANCH}"
          set_config DEPLOY_BRANCH "$DEPLOY_BRANCH"

          if [ "$CURRENT_BRANCH" != "$DEPLOY_BRANCH" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Skipping deploy for $CURRENT_BRANCH. Target branch is $DEPLOY_BRANCH."
            exit 0
          fi

          missing=()
          for key in CPANEL_HOST CPANEL_USERNAME CPANEL_TARGET_DIR; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required DOT_ENV keys: ${missing[*]}"
            exit 1
          fi

          defaults=(
            CPANEL_PORT=22
            CPANEL_PHP_BIN=php
            CPANEL_DEPLOY_METHOD=auto
            PHP_VERSION=8.2
            NODE_VERSION=22
            RSYNC_DELETE=true
            RUN_LARAVEL_MIGRATIONS=true
            RUN_LARAVEL_OPTIMIZE=true
            RUN_LARAVEL_STORAGE_LINK=true
          )

          for item in "${defaults[@]}"; do
            key="${item%%=*}"
            fallback="${item#*=}"
            set_config "$key" "${!key:-$fallback}"
          done

          {
            echo "should_deploy=true"
            echo "php_version=$PHP_VERSION"
            echo "node_version=$NODE_VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.config.outputs.should_deploy == 'true'
        uses: actions/checkout@v4

      - name: Setup PHP
        if: steps.config.outputs.should_deploy == 'true' && hashFiles('composer.json') != ''
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ steps.config.outputs.php_version }}
          tools: composer:v2
          coverage: none

      - name: Install PHP dependencies
        if: steps.config.outputs.should_deploy == 'true' && hashFiles('composer.json') != ''
        shell: bash
        run: |
          set -Eeuo pipefail

          if [ -n "${COMPOSER_INSTALL_COMMAND:-}" ]; then
            bash -lc "$COMPOSER_INSTALL_COMMAND"
          else
            composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader
          fi

      - name: Setup Node
        if: steps.config.outputs.should_deploy == 'true' && hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.config.outputs.node_version }}

      - name: Install and build frontend assets
        if: steps.config.outputs.should_deploy == 'true' && hashFiles('package.json') != ''
        shell: bash
        run: |
          set -Eeuo pipefail

          if [ -n "${NODE_INSTALL_COMMAND:-}" ]; then
            bash -lc "$NODE_INSTALL_COMMAND"
          elif [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --immutable || yarn install --frozen-lockfile
          elif [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install
          fi

          if [ -n "${NODE_BUILD_COMMAND:-}" ]; then
            bash -lc "$NODE_BUILD_COMMAND"
          elif node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.build ? 0 : 1)"; then
            if [ -f pnpm-lock.yaml ]; then
              pnpm run build
            elif [ -f yarn.lock ]; then
              yarn build
            else
              npm run build
            fi
          else
            echo "No build script found. Skipping frontend build."
          fi

      - name: Deploy to cPanel
        if: steps.config.outputs.should_deploy == 'true'
        shell: bash
        env:
          CPANEL_SSH_KEY_SECRET: ${{ secrets.CPANEL_SSH_KEY }}
          CPANEL_PASSWORD_SECRET: ${{ secrets.CPANEL_PASSWORD }}
          CPANEL_EXCLUDES_SECRET: ${{ secrets.CPANEL_EXCLUDES }}
          CPANEL_REMOTE_POST_DEPLOY_SECRET: ${{ secrets.CPANEL_REMOTE_POST_DEPLOY }}
        run: |
          set -Eeuo pipefail

          SSHPASS_PREFIX=()
          AUTH_METHOD=

          setup_auth() {
            if [ -n "${CPANEL_PASSWORD_SECRET:-}" ]; then
              if ! command -v sshpass >/dev/null 2>&1; then
                sudo apt-get update
                sudo apt-get install -y sshpass
              fi

              AUTH_METHOD=password
              export SSHPASS="$CPANEL_PASSWORD_SECRET"
              SSHPASS_PREFIX=(sshpass -e)
            elif [ -n "${CPANEL_SSH_KEY_SECRET:-}" ]; then
              install -m 700 -d "$HOME/.ssh"
              SSH_KEY="$HOME/.ssh/cpanel_deploy_key"
              printf '%s\n' "$CPANEL_SSH_KEY_SECRET" > "$SSH_KEY"
              chmod 600 "$SSH_KEY"
              AUTH_METHOD=key
            else
              echo "::error::Provide either CPANEL_SSH_KEY or CPANEL_PASSWORD secret."
              exit 1
            fi
          }

          write_excludes() {
            EXCLUDES_FILE="$RUNNER_TEMP/rsync-excludes.txt"

            {
              cat <<'EOF'
          .git/
          .github/
          .env
          .env.*
          node_modules/
          storage/
          public/storage
          bootstrap/cache/
          EOF

              if [ -n "${CPANEL_EXCLUDES_SECRET:-}" ]; then
                printf '%s\n' "$CPANEL_EXCLUDES_SECRET"
              fi
            } | sed \
              -e 's/^[[:space:]]*//' \
              -e '/^[[:space:]]*$/d' \
              -e '/^#/d' \
              > "$EXCLUDES_FILE"

            TAR_EXCLUDES_FILE="$RUNNER_TEMP/tar-excludes.txt"
            awk '
              {
                pattern = $0
                sub(/\/+$/, "", pattern)
                print pattern
                print "./" pattern
              }
            ' "$EXCLUDES_FILE" > "$TAR_EXCLUDES_FILE"
          }

          build_ssh_args() {
            SSH_ARGS=(
              -p "$CPANEL_PORT"
              -T
              -o StrictHostKeyChecking=accept-new
            )

            if [ "$AUTH_METHOD" = "key" ]; then
              SSH_ARGS+=(-i "$SSH_KEY" -o IdentitiesOnly=yes)
            else
              SSH_ARGS+=(-o PubkeyAuthentication=no -o PreferredAuthentications=password)
            fi
          }

          build_scp_args() {
            SCP_ARGS=(
              -P "$CPANEL_PORT"
              -o StrictHostKeyChecking=accept-new
            )

            if [ "$AUTH_METHOD" = "key" ]; then
              SCP_ARGS+=(-i "$SSH_KEY" -o IdentitiesOnly=yes)
            else
              SCP_ARGS+=(-o PubkeyAuthentication=no -o PreferredAuthentications=password)
            fi
          }

          is_clean_ssh_shell() {
            local marker="__github_cpanel_clean_shell__"
            local output

            output="$("${SSHPASS_PREFIX[@]}" ssh "${SSH_ARGS[@]}" "$CPANEL_USERNAME@$CPANEL_HOST" "printf '%s\n' '$marker'")"

            if [ "$output" != "$marker" ]; then
              CLEAN_SHELL_OUTPUT="$output"
              return 1
            fi

            CLEAN_SHELL_OUTPUT=
            return 0
          }

          ensure_remote_target() {
            printf -v REMOTE_TARGET '%q' "$CPANEL_TARGET_DIR"
            "${SSHPASS_PREFIX[@]}" ssh "${SSH_ARGS[@]}" "$CPANEL_USERNAME@$CPANEL_HOST" "mkdir -p $REMOTE_TARGET"
          }

          remote_has_command() {
            "${SSHPASS_PREFIX[@]}" ssh "${SSH_ARGS[@]}" "$CPANEL_USERNAME@$CPANEL_HOST" "command -v $1 >/dev/null 2>&1"
          }

          select_deploy_method() {
            case "$CPANEL_DEPLOY_METHOD" in
              auto)
                if remote_has_command rsync && is_clean_ssh_shell; then
                  SELECTED_DEPLOY_METHOD=rsync
                elif remote_has_command rsync; then
                  SELECTED_DEPLOY_METHOD=archive
                  echo "::warning::Remote rsync exists, but the SSH shell prints startup output. Falling back to archive upload."
                  echo "Remote stdout was:"
                  printf '%s\n' "$CLEAN_SHELL_OUTPUT"
                else
                  SELECTED_DEPLOY_METHOD=archive
                  echo "::warning::Remote rsync was not found. Falling back to archive upload."
                fi
                ;;
              rsync)
                if ! remote_has_command rsync; then
                  echo "::error::CPANEL_DEPLOY_METHOD=rsync requires rsync on the cPanel server."
                  exit 1
                fi
                if ! is_clean_ssh_shell; then
                  echo "::error::CPANEL_DEPLOY_METHOD=rsync requires a clean non-interactive SSH shell."
                  echo "::error::Remove or guard startup output from files such as ~/.bashrc, ~/.bash_profile, ~/.profile, and ~/.ssh/rc."
                  echo "Remote stdout was:"
                  printf '%s\n' "$CLEAN_SHELL_OUTPUT"
                  exit 1
                fi
                SELECTED_DEPLOY_METHOD=rsync
                ;;
              archive)
                SELECTED_DEPLOY_METHOD=archive
                ;;
              *)
                echo "::error::Invalid CPANEL_DEPLOY_METHOD: $CPANEL_DEPLOY_METHOD. Use auto, rsync, or archive."
                exit 1
                ;;
            esac

            if [ "$SELECTED_DEPLOY_METHOD" = "archive" ]; then
              if ! remote_has_command tar; then
                echo "::error::Archive deploy fallback requires tar on the cPanel server."
                exit 1
              fi

              if [ "$RSYNC_DELETE" = "true" ]; then
                echo "::warning::RSYNC_DELETE=true is ignored because archive deploy does not support remote delete."
              fi
            fi

            echo "Using $SELECTED_DEPLOY_METHOD deploy method."
          }

          deploy_with_rsync() {
            DELETE_ARGS=()
            if [ "$RSYNC_DELETE" = "true" ]; then
              DELETE_ARGS=(--delete --delete-delay)
            fi

            local rsh="ssh -p $CPANEL_PORT -T -o StrictHostKeyChecking=accept-new"
            if [ "$AUTH_METHOD" = "key" ]; then
              rsh="$rsh -i $SSH_KEY -o IdentitiesOnly=yes"
            else
              rsh="sshpass -e $rsh -o PubkeyAuthentication=no -o PreferredAuthentications=password"
            fi

            rsync -az --delay-updates "${DELETE_ARGS[@]}" \
              --exclude-from="$EXCLUDES_FILE" \
              -e "$rsh" \
              ./ "$CPANEL_USERNAME@$CPANEL_HOST:${CPANEL_TARGET_DIR%/}/"
          }

          deploy_with_archive() {
            local archive_file="$RUNNER_TEMP/cpanel-deploy.tar.gz"
            local remote_archive=".github-cpanel-deploy-${GITHUB_RUN_ID:-manual}-${GITHUB_RUN_ATTEMPT:-1}.tar.gz"

            tar -czf "$archive_file" --exclude-from="$TAR_EXCLUDES_FILE" -C . .
            "${SSHPASS_PREFIX[@]}" scp "${SCP_ARGS[@]}" "$archive_file" "$CPANEL_USERNAME@$CPANEL_HOST:$remote_archive"

            printf -v REMOTE_ENV 'CPANEL_TARGET_DIR=%q REMOTE_ARCHIVE=%q' \
              "$CPANEL_TARGET_DIR" \
              "$remote_archive"

            {
              cat <<'REMOTE_SCRIPT'
          set -Eeuo pipefail
          trap 'rm -f "$REMOTE_ARCHIVE"' EXIT

          mkdir -p "$CPANEL_TARGET_DIR"
          tar -xzf "$REMOTE_ARCHIVE" -C "$CPANEL_TARGET_DIR"
          REMOTE_SCRIPT
            } | "${SSHPASS_PREFIX[@]}" ssh "${SSH_ARGS[@]}" "$CPANEL_USERNAME@$CPANEL_HOST" "$REMOTE_ENV bash -se"
          }

          run_remote() {
            printf -v REMOTE_ENV \
              'CPANEL_TARGET_DIR=%q CPANEL_PHP_BIN=%q RUN_LARAVEL_MIGRATIONS=%q RUN_LARAVEL_OPTIMIZE=%q RUN_LARAVEL_STORAGE_LINK=%q' \
              "$CPANEL_TARGET_DIR" \
              "$CPANEL_PHP_BIN" \
              "$RUN_LARAVEL_MIGRATIONS" \
              "$RUN_LARAVEL_OPTIMIZE" \
              "$RUN_LARAVEL_STORAGE_LINK"

            {
              cat <<'REMOTE_SCRIPT'
          set -Eeuo pipefail

          if command -v flock >/dev/null 2>&1; then
            exec 9>"$HOME/.github-cpanel-deploy.lock"
            flock -n 9 || {
              echo "Another deployment is already running."
              exit 1
            }
          else
            LOCK_DIR="$HOME/.github-cpanel-deploy.lock.d"
            mkdir "$LOCK_DIR" 2>/dev/null || {
              echo "Another deployment is already running."
              exit 1
            }
            trap 'rmdir "$LOCK_DIR"' EXIT
          fi

          cd "$CPANEL_TARGET_DIR"

          if [ -f artisan ]; then
            mkdir -p \
              storage/app/public \
              storage/framework/cache \
              storage/framework/sessions \
              storage/framework/views \
              storage/logs \
              bootstrap/cache

            "$CPANEL_PHP_BIN" artisan optimize:clear

            if [ "$RUN_LARAVEL_MIGRATIONS" = "true" ]; then
              "$CPANEL_PHP_BIN" artisan migrate --force
            fi

            if [ "$RUN_LARAVEL_STORAGE_LINK" = "true" ]; then
              "$CPANEL_PHP_BIN" artisan storage:link || true
            fi

            if [ "$RUN_LARAVEL_OPTIMIZE" = "true" ]; then
              "$CPANEL_PHP_BIN" artisan optimize
            fi
          fi
          REMOTE_SCRIPT

              if [ -n "${CPANEL_REMOTE_POST_DEPLOY_SECRET:-}" ]; then
                printf '\n# Custom remote post-deploy\n'
                printf '%s\n' "$CPANEL_REMOTE_POST_DEPLOY_SECRET"
              fi
            } | "${SSHPASS_PREFIX[@]}" ssh "${SSH_ARGS[@]}" "$CPANEL_USERNAME@$CPANEL_HOST" "$REMOTE_ENV bash -se"
          }

          setup_auth
          write_excludes
          build_ssh_args
          build_scp_args
          select_deploy_method
          ensure_remote_target

          if [ "$SELECTED_DEPLOY_METHOD" = "rsync" ]; then
            deploy_with_rsync
          else
            deploy_with_archive
          fi

          run_remote
